name: Fork Image (ghcr)

# Build and publish a multi-arch image to ghcr.io for the manawenuz fork.
# - push to master  → ghcr.io/<owner>/wg-easy-fork:edge
# - push of v*       → ghcr.io/<owner>/wg-easy-fork:vX.Y.Z + :latest
# - manual dispatch  → ghcr.io/<owner>/wg-easy-fork:manual-<sha>
#
# Upstream's deploy.yml is gated on `github.repository_owner == 'wg-easy'`
# so it stays inert in this fork; this workflow is the fork-only path.

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push (${{ matrix.arch.platform }})
    runs-on: ${{ matrix.arch.os }}
    if: github.repository_owner != 'wg-easy'
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Compute build metadata
        shell: bash
        run: |
          echo "WG_BUILD_REVISION=${GITHUB_SHA}" >> "$GITHUB_ENV"
          if [[ "$GITHUB_REF" == "refs/heads/master" ]]; then
            echo "WG_BUILD_CHANNEL=edge" >> "$GITHUB_ENV"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "WG_BUILD_CHANNEL=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "WG_BUILD_CHANNEL=manual" >> "$GITHUB_ENV"
          fi

      - name: Compute platform pair
        run: echo "PLATFORM_PAIR=${{ matrix.arch.platform }}" | tr '/' '-' >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/wg-easy-fork
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=edge,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=manual-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.arch.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            WG_BUILD_CHANNEL=${{ env.WG_BUILD_CHANNEL }}
            WG_BUILD_REVISION=${{ env.WG_BUILD_REVISION }}
            WG_IMAGE_REPOSITORY=ghcr.io/${{ github.repository_owner }}/wg-easy-fork
            WG_UPDATE_REPO=${{ github.repository }}
            WG_UPDATE_BRANCH=master
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/wg-easy-fork,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.repository_owner != 'wg-easy'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/wg-easy-fork
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=edge,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=manual-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      - name: Create & push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/wg-easy-fork@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/wg-easy-fork:${{ steps.meta.outputs.version }}
